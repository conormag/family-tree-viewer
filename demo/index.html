<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Family Tree Viewer — Demo</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, -apple-system, sans-serif; background: #f8fafc; }
    header {
      padding: 12px 24px;
      background: white;
      border-bottom: 1px solid #e2e8f0;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    header h1 { font-size: 18px; font-weight: 700; color: #1e293b; }
    .controls { display: flex; gap: 8px; align-items: center; margin-left: auto; }
    button {
      padding: 6px 14px;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      border: 1px solid #e2e8f0;
      background: white;
      color: #374151;
    }
    button:hover { background: #f1f5f9; }
    button.primary { background: #3b82f6; color: white; border-color: #3b82f6; }
    button.primary:hover { background: #2563eb; }
    #tree-container {
      position: relative;
      width: 100vw;
      height: calc(100vh - 57px);
      overflow: hidden;
    }
    label { font-size: 13px; color: #374151; }
    #theme-toggle { cursor: pointer; }
  </style>
</head>
<body>
  <header>
    <h1>🌳 Family Tree Viewer</h1>
    <div class="controls">
      <label>
        <input type="checkbox" id="theme-toggle"> Dark mode
      </label>
      <button onclick="viewer.fitToScreen()">Fit to screen</button>
      <button onclick="exportGedcom()">Export GEDCOM</button>
      <label>
        <input type="file" id="file-input" accept=".ged" style="display:none">
        <button onclick="document.getElementById('file-input').click()">Load .ged file</button>
      </label>
    </div>
  </header>

  <div id="tree-container"></div>

  <script type="module">
    import { FamilyTreeViewer } from '../src/index.ts';

    let currentGedcom = null;

    const viewer = new FamilyTreeViewer('#tree-container', {
      theme: 'light',
      readonly: false,
      onSave: (gedcom) => {
        currentGedcom = gedcom;
        console.log('GEDCOM updated, length:', gedcom.length);
      },
    });

    window.viewer = viewer;

    // Load sample.ged
    fetch(import.meta.env.BASE_URL + 'sample.ged')
      .then(r => r.text())
      .then(text => {
        viewer.loadGedcom(text);
        currentGedcom = text;
      });

    // File input
    document.getElementById('file-input').addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = (ev) => {
        viewer.loadGedcom(ev.target.result);
      };
      reader.readAsText(file, 'utf-8');
    });

    // Theme toggle
    document.getElementById('theme-toggle').addEventListener('change', (e) => {
      const theme = e.target.checked ? 'dark' : 'light';
      document.getElementById('tree-container').className = '';
      // Re-create viewer with new theme (simplest approach for demo)
      viewer.destroy();
      const container = document.getElementById('tree-container');
      const gedcom = currentGedcom;
      window.viewer = new FamilyTreeViewer(container, {
        gedcom,
        theme,
        readonly: false,
        onSave: (g) => { currentGedcom = g; },
      });
    });

    window.exportGedcom = () => {
      const gedcom = viewer.getGedcom();
      const blob = new Blob([gedcom], { type: 'text/plain;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'family-tree.ged';
      a.click();
      URL.revokeObjectURL(url);
    };
  </script>
</body>
</html>
